<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>People</title>
  <link rel="stylesheet" href="/WPR281_Project/index.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">People</div>
    <div class="profile-area">
      <button onclick="window.location.href='index.html'" class="btn btn-primary">Back</button>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h3>Add Person</h3>
      <input id="personName" placeholder="Name">
      <input id="personRole" placeholder="Role">
      <input id="personEmail" placeholder="Email">
      <button onclick="createPerson()" class="btn btn-primary">Add</button>
    </div>

    <div class="card">
      <h3>People List</h3>
      <ul id="peopleList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function createPerson() {
      const name = document.getElementById('personName').value.trim();
      const role = document.getElementById('personRole').value.trim();
      const email = document.getElementById('personEmail').value.trim();
      if (!name) return alert("Name required");
      people.push({ id: Date.now(), name, role, email });
      localStorage.setItem('people', JSON.stringify(people));
      renderPeople();
    }
    function renderPeople() {
      const list = document.getElementById('peopleList');
      list.innerHTML = "";
      people.forEach(p => {
        peopleList.innerHTML += `<li>${p.name} - ${p.role} - ${p.email}</li>`;
      });
    }
    renderPeople();
  </script>
</body>
</html>
