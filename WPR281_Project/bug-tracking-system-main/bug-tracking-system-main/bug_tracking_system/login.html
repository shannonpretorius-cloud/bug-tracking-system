<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Bug Tracker - Sign In</title>
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .auth-card { max-width: 400px; width: 100%; margin: auto; border-radius: 12px; border: none; }
    </style>
</head>
<body>
    <div class="card auth-card shadow-lg p-4">
        <h3 class="text-center mb-4 fw-bold">Sign In</h3>
        <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="email@example.com">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="loginPass" class="form-control" placeholder="••••••••">
        </div>
        <button onclick="handleSignIn()" class="btn btn-dark w-100 py-2">Sign In</button>
        <p class="text-center mt-3 small">New here? <a href="signup.html">Add New User</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
