<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Bug Tracker - Sign Up</title>
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .auth-card { max-width: 450px; width: 100%; margin: auto; border-radius: 12px; border: none; }
    </style>
</head>
<body>
    <div class="card auth-card shadow-lg p-4">
        <h3 class="text-center mb-4 fw-bold">Add New User</h3>
        <div class="row g-2 mb-3">
            <div class="col">
                <label class="form-label small fw-bold">Name</label>
                <input type="text" id="regName" class="form-control">
            </div>
            <div class="col">
                <label class="form-label small fw-bold">Surname</label>
                <input type="text" id="regSurname" class="form-control">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <input type="text" id="regUser" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input type="email" id="regEmail" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" id="regPass" class="form-control">
        </div>
        <button onclick="addUser()" class="btn btn-primary w-100 py-2">Create Account</button>
        <p class="text-center mt-3 small">Already have an account? <a href="login.html">Sign In</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
