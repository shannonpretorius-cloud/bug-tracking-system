<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS_Folder/style.css"> 
    <title>Bug Tracker - Sign Up</title>
    
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="text-center" style="margin-top: 0;">Add New User</h2>
            
            <div class="row">
                <div class="col">
                    <label>Name</label>
                    <input type="text" id="regName" placeholder="John">
                </div>
                <div class="col">
                    <label>Surname</label>
                    <input type="text" id="regSurname" placeholder="Doe">
                </div>
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text" id="regUser" placeholder="johndoe123">
            </div>

            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="john@example.com">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="regPass" placeholder="••••••••">
            </div>

            <button onclick="addUser()" class="btn btn-primary">Create Account</button>
            
            <p class="text-center mt-3 small">
                Already have an account? <a href="login.html">Sign In</a>
            </p>
        </div>
    </div>

    
    <script src="../JavaScrip_Folder/signup.js"></script>
</body>
</html>
