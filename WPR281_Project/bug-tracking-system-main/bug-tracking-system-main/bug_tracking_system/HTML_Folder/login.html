<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">   
    <title>Bug Tracker - Sign In</title>
    
</head>
<body>
   <div class="container" style="display: flex; height: 90vh; align-items: center;">
    <div class="card" style="max-width: 400px; margin: auto; width: 100%;">
        <h3 class="text-center fw-bold mb-3">Sign In</h3>
        <div class="mb-3">
            <label class="small fw-bold">Email</label>
            <input type="email" id="loginEmail" placeholder="email@example.com">
        </div>
        <div class="mb-3">
            <label class="small fw-bold">Password</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>
        <button onclick="handleSignIn()" class="btn btn-dark" style="width: 100%;">Sign In</button>
        <p class="text-center mt-3 small">New here? <a href="signup.html">Add New User</a></p>
    </div>
</div>

    <script src="login.js"></script>
</body>
</html>
