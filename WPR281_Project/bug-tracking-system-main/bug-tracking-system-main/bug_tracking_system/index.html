<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Bug Tracker - Dashboard</title>
    <style>
        
        
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Bug Tracker</div>
        <div class="profile-area">
            <span id="navUserName" style="font-size: 0.9rem; font-weight: bold;"></span>
            <img id="navUserPic" src="" class="profile-img">
            <button onclick="logout()" class="btn btn-outline-danger" style="padding: 6px 12px; font-size: 0.8rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 style="margin-top: 0;">Create New Ticket</h3>
            <form id="issueForm" class="form-row">
                <div class="form-group" style="flex: 3;">
                    <label>Description</label>
                    <input type="text" id="summary" placeholder="Describe the bug..." required>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="priority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Ticket</button>
            </form>
        </div>

        <div id="issueList"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Guard: If no session, go to login immediately
        if (!localStorage.getItem('sessionUser')) {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
