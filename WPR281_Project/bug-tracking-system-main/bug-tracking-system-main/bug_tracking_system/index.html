<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Bug Tracker - Dashboard</title>
    <style>
        .top-border { border-top: 6px solid #0d6efd; }
        .profile-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .ticket-card { transition: 0.3s; }
        .ticket-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark top-border mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">Bug Tracker</span>
            <div class="d-flex align-items-center text-white">
                <span id="navUserName" class="me-3 fw-bold small"></span>
                <img id="navUserPic" src="" class="profile-img" alt="User">
                <button onclick="logout()" class="btn btn-sm btn-outline-danger ms-3">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3">Create New Ticket</h5>
                <form id="issueForm" class="row g-3">
                    <div class="col-md-7"><input type="text" id="summary" class="form-control" placeholder="Issue description..." required></div>
                    <div class="col-md-3">
                        <select id="priority" class="form-select">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Add</button></div>
                </form>
            </div>
        </div>
        <div id="issueList" class="row"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Security Check: Redirect to login if not signed in
        if (!localStorage.getItem('sessionUser')) { window.location.href = 'login.html'; }
    </script>
</body>
</html>
